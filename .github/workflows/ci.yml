name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  synthetic-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch scipy --index-url https://download.pytorch.org/whl/cpu

      - name: Install package in editable mode
        run: python -m pip install --no-deps -e .

      - name: Compile package
        run: python -m compileall -q turboquant

      - name: Run synthetic TurboQuant tests
        run: python -m turboquant.test_turboquant
